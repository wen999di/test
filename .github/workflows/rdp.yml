name: Debug Windows via Bore RDP

on: workflow_dispatch

jobs:
  run-windows-rdp:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Windows RDP & Bore Tunnel
        run: |
          Write-Host "正在配置远程桌面..."
          net user runneradmin YourStrongPassw0rd!
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          
          Write-Host "下载并启动 Bore (极速免注册 TCP 穿透)..."
          # 下载原生的 bore Windows 客户端
          Invoke-WebRequest -Uri "https://github.com/ekzhang/bore/releases/download/v0.5.1/bore-v0.5.1-x86_64-pc-windows-msvc.zip" -OutFile "bore.zip"
          Expand-Archive -Path bore.zip -DestinationPath .
          
          # 隐藏启动 bore，将本地 3389 映射到公网 bore.pub
          Start-Process -FilePath ".\bore.exe" -ArgumentList "local 3389 --to bore.pub" -WindowStyle Hidden -RedirectStandardOutput "bore.log" -RedirectStandardError "bore_err.log"
          
          Write-Host "等待获取公网地址 (约 5 秒)..."
          Start-Sleep -Seconds 5
          
          # 提取分配到的公网地址
          $logContent = ""
          if (Test-Path bore.log) { $logContent += Get-Content bore.log -Raw }
          if (Test-Path bore_err.log) { $logContent += Get-Content bore_err.log -Raw }
          
          $match = [regex]::Match($logContent, 'bore\.pub:\d+')
          
          if ($match.Success) {
              $bore_url = $match.Value
              Write-Host "========================================================================"
              Write-Host "✅ 远程桌面隧道已建立！"
              Write-Host "🌐 请在你的电脑上打开『远程桌面连接(mstsc)』，直接输入以下地址连入："
              Write-Host "👉 $bore_url"
              Write-Host "👤 用户名: runneradmin"
              Write-Host "🔑 密码: YourStrongPassw0rd!"
              Write-Host "========================================================================"
          } else {
              Write-Error "❌ 无法获取 Bore 地址，请查看下方完整日志："
              Write-Host "【日志输出】:"
              Write-Host $logContent
              exit 1
          }

      - name: Keep Alive
        run: |
          Write-Host "正在保持连接... 若要结束请手动在 GitHub 页面点击 Cancel workflow。"
          while ($true) { Start-Sleep -Seconds 60 }
