name: Debug Windows via Cloudflare RDP

on: workflow_dispatch

jobs:
  run-windows-rdp:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Windows RDP & Cloudflare Tunnel
        run: |
          Write-Host "正在配置远程桌面..."
          net user runneradmin YourStrongPassw0rd!
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          
          Write-Host "下载并启动 Cloudflare Tunnel..."
          # 下载 Windows 版 cloudflared
          Invoke-WebRequest -Uri "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.exe" -OutFile "cloudflared.exe"
          
          # 后台运行，将本地 3389 (RDP) 端口穿透出去
          Start-Process -FilePath ".\cloudflared.exe" -ArgumentList "tunnel --url tcp://localhost:3389" -RedirectStandardError "tunnel.log" -WindowStyle Hidden
          
          # 等待隧道建立
          Write-Host "等待获取公网地址 (约 8 秒)..."
          Start-Sleep -Seconds 8
          
          # 从日志中提取 trycloudflare.com 网址
          $logContent = Get-Content tunnel.log -Raw
          $match = [regex]::Match($logContent, 'https://[a-zA-Z0-9-]+\.trycloudflare\.com')
          
          if ($match.Success) {
              $cf_url = $match.Value
              $cf_host = $cf_url.Replace("https://", "")
              
              Write-Host "========================================================================"
              Write-Host "✅ 远程桌面隧道已建立！"
              Write-Host "🌐 你的临时主机名是: $cf_host"
              Write-Host ""
              Write-Host "【如何连接】请在你自己的电脑上执行以下两步："
              Write-Host "1. 打开本地终端 (CMD/PowerShell)，运行以下命令建立本地映射："
              Write-Host "   cloudflared access tcp --hostname $cf_host --url localhost:33890"
              Write-Host "2. 保持上一个窗口不要关。打开『远程桌面连接(mstsc)』，输入地址："
              Write-Host "   localhost:33890"
              Write-Host ""
              Write-Host "👤 用户名: runneradmin"
              Write-Host "🔑 密码: YourStrongPassw0rd!"
              Write-Host "========================================================================"
          } else {
              Write-Error "❌ 无法获取 Cloudflare Tunnel 地址，请查看下方完整日志："
              Get-Content tunnel.log
              exit 1
          }

      - name: Keep Alive
        run: |
          Write-Host "正在保持连接... 若要结束请手动在 GitHub 页面点击 Cancel workflow。"
          while ($true) { Start-Sleep -Seconds 60 }
