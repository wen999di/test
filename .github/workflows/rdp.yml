name: Debug Windows via ZeroTier RDP

on:
  workflow_dispatch: {}
  push:
    paths:
      - .github/workflows/rdp.yml

jobs:
  run-windows-rdp:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Local RDP
        run: |
          Write-Host "1. 配置系统密码、防火墙并启动 RDP 服务..."
          net user runneradmin YourStrongPassw0rd!
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          # 尝试启动 TermService
          if ((Get-Service -Name TermService -ErrorAction SilentlyContinue)) {
              Start-Service -Name TermService -WarningAction SilentlyContinue
          }

      - name: Install and Join ZeroTier
        env:
          ZEROTIER_NETWORK_ID: ${{ secrets.ZEROTIER_NETWORK_ID }}
          ZEROTIER_API_TOKEN: ${{ secrets.ZEROTIER_API_TOKEN }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:ZEROTIER_NETWORK_ID) -or [string]::IsNullOrWhiteSpace($env:ZEROTIER_API_TOKEN)) {
              Write-Error "❌ 缺少 ZEROTIER_NETWORK_ID 或 ZEROTIER_API_TOKEN，请检查 GitHub Secrets！"
              exit 1
          }

          Write-Host "2. 安装 ZeroTier..."
          choco install zerotier-one -y

          Write-Host "等待 ZeroTier 服务安装并启动（最多 30s）..."
          $svc = Get-Service -Name "ZeroTierOne" -ErrorAction SilentlyContinue
          $wait = 0
          while (-not $svc -and $wait -lt 30) {
              Start-Sleep -Seconds 1
              $svc = Get-Service -Name "ZeroTierOne" -ErrorAction SilentlyContinue
              $wait++
          }
          if ($svc) {
              if ($svc.Status -ne 'Running') {
                  Start-Service -Name "ZeroTierOne" -WarningAction SilentlyContinue
              }
          } else {
              Write-Warning "无法找到 ZeroTierOne 服务，继续尝试通过可执行文件检测。"
          }

          # 尝试通过常见路径查找 zerotier-cli
          $candidates = @(
              "$env:ProgramFiles\ZeroTier\One\zerotier-cli.exe",
              "${env:ProgramFiles(x86)}\ZeroTier\One\zerotier-cli.exe",
              "C:\ProgramData\ZeroTier\One\zerotier-cli.exe",
              "$env:ProgramFiles\ZeroTier\One\zerotier-cli.bat",
              "${env:ProgramFiles(x86)}\ZeroTier\One\zerotier-cli.bat",
              "C:\ProgramData\ZeroTier\One\zerotier-cli.bat"
          )

          $ZT_CLI = $null
          foreach ($p in $candidates) {
              if (Test-Path $p) { $ZT_CLI = $p; break }
          }

          # 如果仍未找到，做一次有限搜索（避免全盘递归太慢）
          if (-not $ZT_CLI) {
              Write-Host "在常见路径没有找到 zerotier-cli，尝试搜索 Program Files 目录..."
              $found = Get-ChildItem -Path $env:ProgramFiles, ${env:ProgramFiles(x86)} -Filter 'zerotier-cli.*' -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
              if ($found) { $ZT_CLI = $found.FullName }
          }

          if (-not $ZT_CLI) {
              Write-Error "❌ 未能找到 zerotier-cli 可执行文件。请确认 ZeroTier 已正确安装。"
              exit 1
          }

          Write-Host "使用 zerotier-cli 路径: $ZT_CLI"

          # 获取本机 Node ID
          $zt_info = (& $ZT_CLI info | Out-String).Trim()
          if (-not $zt_info) {
              Write-Host "等待 zerotier-cli 准备 (最多 10 秒)..."
              Start-Sleep -Seconds 5
              $zt_info = (& $ZT_CLI info | Out-String).Trim()
          }

          if (-not $zt_info) {
              Write-Error "❌ zerotier-cli 无响应，请检查服务状态与安装。"
              exit 1
          }

          $node_id = ($zt_info -split '\s+')[2]
          Write-Host "本机 ZeroTier Node ID: $node_id"
          echo "ZT_NODE_ID=$node_id" >> $env:GITHUB_ENV

          Write-Host "加入 ZeroTier 网络 $env:ZEROTIER_NETWORK_ID ..."
          & $ZT_CLI join $env:ZEROTIER_NETWORK_ID

          Write-Host "通过 ZeroTier API 自动授权该节点..."
          $headers = @{ "Authorization" = "bearer $($env:ZEROTIER_API_TOKEN)" }
          $body = @{ "config" = @{ "authorized" = $true } } | ConvertTo-Json
          Invoke-RestMethod -Uri "https://my.zerotier.com/api/v1/network/$($env:ZEROTIER_NETWORK_ID)/member/$node_id" -Method Post -Headers $headers -Body $body -ContentType "application/json"

          Write-Host "等待分配局域网 IP (最多 30 秒)..."
          $zt_ip = ""
          for ($i = 0; $i -lt 15; $i++) {
              Start-Sleep -Seconds 2
              $network_info = & $ZT_CLI listnetworks | Out-String
              $match = [regex]::Match($network_info, '\b(?:10|172|192)\.\d{1,3}\.\d{1,3}\.\d{1,3}\b')
              if ($match.Success) { $zt_ip = $match.Value; break }
          }

          if ($zt_ip -eq "") {
              Write-Error "❌ 未能获取到 ZeroTier IP，请检查网络设置与控制台是否已授权节点。"
              # 导出调试信息供你查看
              Write-Host "`n---- zerotier-cli listnetworks 输出: ----`n"
              & $ZT_CLI listnetworks | Write-Host
              exit 1
          }

          echo "ZT_IP=$zt_ip" >> $env:GITHUB_ENV
          Write-Host "=================================================="
          Write-Host "✅ ZeroTier 已连通，分配到的局域网 IP: $zt_ip"
          Write-Host "请确保本地设备也加入同一 ZeroTier 网络，然后用 mstsc 连接该 IP。"
          Write-Host "用户名: runneradmin  密码: YourStrongPassw0rd!"
          Write-Host "=================================================="

      - name: Start HTTP Web Server
        run: |
          $zt_ip = $env:ZT_IP
          $zt_node_id = $env:ZT_NODE_ID

          if (-not $zt_ip) {
              Write-Warning "ZT_IP 未设置，跳过网页服务器启动"
              exit 0
          }

          netsh advfirewall firewall add rule name="HTTP Test Server 8080" dir=in action=allow protocol=TCP localport=8080 | Out-Null

          $timestamp = (Get-Date).ToString("yyyy-MM-dd HH:mm:ss")
          $htmlPath = "$env:TEMP\zt_index.html"
          $scriptPath = "$env:TEMP\zt_server.ps1"

          $style = "body{font-family:Arial,sans-serif;margin:40px;background:#f0f4f8;}" +
                   ".card{background:white;padding:30px;border-radius:12px;box-shadow:0 4px 12px rgba(0,0,0,.1);max-width:640px;margin:auto;}" +
                   "h1{color:#1a73e8;margin-bottom:8px;}" +
                   ".ok{background:#34a853;color:white;padding:4px 14px;border-radius:20px;font-size:13px;}" +
                   "table{width:100%;border-collapse:collapse;margin:12px 0;}" +
                   "td,th{padding:10px 8px;border-bottom:1px solid #e8eaed;text-align:left;}" +
                   "th{color:#5f6368;font-weight:500;font-size:13px;}" +
                   "code{background:#f1f3f4;padding:2px 6px;border-radius:4px;}"
          $html = "<!DOCTYPE html><html><head><meta charset='utf-8'><title>ZeroTier Status</title>" +
                  "<style>$style</style></head><body><div class='card'>" +
                  "<h1>GitHub Actions ZeroTier Node</h1>" +
                  "<span class='ok'>&#10003; 网络连接正常</span>" +
                  "<h2 style='margin-top:24px;font-size:16px;'>节点信息</h2>" +
                  "<table><tr><th>项目</th><th>值</th></tr>" +
                  "<tr><td>ZeroTier Node ID</td><td><code>$zt_node_id</code></td></tr>" +
                  "<tr><td>ZeroTier IP</td><td><code>$zt_ip</code></td></tr>" +
                  "<tr><td>HTTP 测试页面</td><td><code>http://$zt_ip`:8080/</code></td></tr>" +
                  "<tr><td>启动时间</td><td>$timestamp</td></tr></table>" +
                  "<h2 style='margin-top:24px;font-size:16px;'>RDP 连接信息</h2>" +
                  "<table><tr><td>地址</td><td><code>$zt_ip`:3389</code></td></tr>" +
                  "<tr><td>用户名</td><td><code>runneradmin</code></td></tr>" +
                  "<tr><td>密码</td><td><code>YourStrongPassw0rd!</code></td></tr></table>" +
                  "<p style='color:#5f6368;font-size:13px;margin-top:20px;'>" +
                  "&#128994; 您能看到此页面，说明 ZeroTier 虚拟网络连接工作正常！</p>" +
                  "</div></body></html>"
          $html | Out-File -FilePath $htmlPath -Encoding UTF8

          $serverLines = @(
              "`$listener = New-Object System.Net.HttpListener",
              "`$listener.Prefixes.Add('http://$zt_ip`:8080/')",
              "`$listener.Start()",
              "while (`$listener.IsListening) {",
              "    `$ctx = `$listener.GetContext()",
              "    `$content = [System.IO.File]::ReadAllText('$htmlPath')",
              "    `$buf = [System.Text.Encoding]::UTF8.GetBytes(`$content)",
              "    `$ctx.Response.ContentType = 'text/html; charset=utf-8'",
              "    `$ctx.Response.ContentLength64 = `$buf.Length",
              "    `$ctx.Response.OutputStream.Write(`$buf, 0, `$buf.Length)",
              "    `$ctx.Response.OutputStream.Close()",
              "}"
          )
          $serverLines | Out-File -FilePath $scriptPath -Encoding UTF8

          $serverStartupWaitSeconds = 2
          $proc = Start-Process powershell -ArgumentList "-NoProfile -ExecutionPolicy Bypass -File `"$scriptPath`"" -WindowStyle Hidden -PassThru
          if (-not $proc -or $proc.HasExited) {
              Write-Warning "HTTP 服务器进程未能成功启动，跳过。"
          } else {
              Start-Sleep -Seconds $serverStartupWaitSeconds
              Write-Host "=================================================="
              Write-Host "🌐 HTTP 网页服务器已启动！"
              Write-Host "请用浏览器访问: http://$zt_ip`:8080/"
              Write-Host "可通过访问此页面测试 ZeroTier 网络连通性"
              Write-Host "=================================================="
          }

      - name: Keep Alive
        run: |
          Write-Host "=================================================="
          Write-Host "调试信息汇总："
          Write-Host "  RDP 地址:      $env:ZT_IP`:3389"
          Write-Host "  HTTP 测试页面: http://$env:ZT_IP`:8080/"
          Write-Host "  用户名: runneradmin  密码: YourStrongPassw0rd!"
          Write-Host "=================================================="
          Write-Host "保持 Action 运行中，调试完成请手动点击 Cancel workflow 结束。"
          while ($true) { Start-Sleep -Seconds 60 }

      - name: Cleanup ZeroTier Node
        if: always()
        env:
          ZEROTIER_NETWORK_ID: ${{ secrets.ZEROTIER_NETWORK_ID }}
          ZEROTIER_API_TOKEN: ${{ secrets.ZEROTIER_API_TOKEN }}
        run: |
          if ($env:ZT_NODE_ID) {
              Write-Host "正在清理临时 ZeroTier 节点 ($env:ZT_NODE_ID) ..."
              $headers = @{ "Authorization" = "bearer $($env:ZEROTIER_API_TOKEN)" }
              Invoke-RestMethod -Uri "https://my.zerotier.com/api/v1/network/$($env:ZEROTIER_NETWORK_ID)/member/$($env:ZT_NODE_ID)" -Method Delete -Headers $headers -ErrorAction SilentlyContinue
              Write-Host "✅ 节点已清理。"
          } else {
              Write-Host "未检测到 ZT_NODE_ID 环境变量，跳过清理。"
          }
