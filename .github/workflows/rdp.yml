name: Debug Windows via ZeroTier RDP

on:
  workflow_dispatch: {}
  push:
    paths:
      - .github/workflows/rdp.yml

jobs:
  run-windows-rdp:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 使用标准 actions 检出私有仓库 wen999di/glacc 到指定目录 glacc-repo
      # 仍然需要在本仓库的 Secrets 中配置包含 repo 权限的 GH_PAT
      - name: Checkout glacc config repo
        uses: actions/checkout@v4
        with:
          repository: wen999di/glacc
          token: ${{ secrets.GH_PAT }}
          path: glacc-repo

      - name: Setup Local RDP
        run: |
          Write-Host "1. 配置系统密码、防火墙并启动 RDP 服务..."
          net user runneradmin YourStrongPassw0rd!
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          # 尝试启动 TermService
          if ((Get-Service -Name TermService -ErrorAction SilentlyContinue)) {
              Start-Service -Name TermService -WarningAction SilentlyContinue
          }

      - name: Install and Join ZeroTier
        env:
          ZEROTIER_NETWORK_ID: ${{ secrets.ZEROTIER_NETWORK_ID }}
          ZEROTIER_API_TOKEN: ${{ secrets.ZEROTIER_API_TOKEN }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:ZEROTIER_NETWORK_ID) -or [string]::IsNullOrWhiteSpace($env:ZEROTIER_API_TOKEN)) {
              Write-Error "❌ 缺少 ZEROTIER_NETWORK_ID 或 ZEROTIER_API_TOKEN，请检查 GitHub Secrets！"
              exit 1
          }

          Write-Host "2. 安装 ZeroTier..."
          choco install zerotier-one -y

          # 尝试通过常见路径查找 zerotier-cli
          $candidates = @(
              "$env:ProgramFiles\ZeroTier\One\zerotier-cli.exe",
              "${env:ProgramFiles(x86)}\ZeroTier\One\zerotier-cli.exe",
              "C:\ProgramData\ZeroTier\One\zerotier-cli.exe",
              "$env:ProgramFiles\ZeroTier\One\zerotier-cli.bat",
              "${env:ProgramFiles(x86)}\ZeroTier\One\zerotier-cli.bat",
              "C:\ProgramData\ZeroTier\One\zerotier-cli.bat"
          )

          $ZT_CLI = $null
          foreach ($p in $candidates) {
              if (Test-Path $p) { $ZT_CLI = $p; break }
          }

          # 如果仍未找到，做一次有限搜索（避免全盘递归太慢）
          if (-not $ZT_CLI) {
              Write-Host "在常见路径没有找到 zerotier-cli，尝试搜索 Program Files 目录..."
              $found = Get-ChildItem -Path $env:ProgramFiles, ${env:ProgramFiles(x86)} -Filter 'zerotier-cli.*' -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
              if ($found) { $ZT_CLI = $found.FullName }
          }

          if (-not $ZT_CLI) {
              Write-Error "❌ 未能找到 zerotier-cli 可执行文件。请确认 ZeroTier 已正确安装。"
              exit 1
          }

          Write-Host "使用 zerotier-cli 路径: $ZT_CLI"

          # 获取本机 Node ID
          $zt_info = (& $ZT_CLI info | Out-String).Trim()
          if (-not $zt_info) {
              Write-Host "等待 zerotier-cli 准备 (最多 10 秒)..."
              Start-Sleep -Seconds 5
              $zt_info = (& $ZT_CLI info | Out-String).Trim()
          }

          if (-not $zt_info) {
              Write-Error "❌ zerotier-cli 无响应，请检查服务状态与安装。"
              exit 1
          }

          $node_id = ($zt_info -split '\s+')[2]
          Write-Host "本机 ZeroTier Node ID: $node_id"
          echo "ZT_NODE_ID=$node_id" >> $env:GITHUB_ENV

          Write-Host "加入 ZeroTier 网络 $env:ZEROTIER_NETWORK_ID ..."
          & $ZT_CLI join $env:ZEROTIER_NETWORK_ID

          Write-Host "通过 ZeroTier API 自动授权该节点..."
          $headers = @{ "Authorization" = "bearer $($env:ZEROTIER_API_TOKEN)" }
          $body = @{ "config" = @{ "authorized" = $true } } | ConvertTo-Json
          Invoke-RestMethod -Uri "https://my.zerotier.com/api/v1/network/$($env:ZEROTIER_NETWORK_ID)/member/$node_id" -Method Post -Headers $headers -Body $body -ContentType "application/json"

          Write-Host "等待分配局域网 IP (最多 30 秒)..."
          $zt_ip = ""
          for ($i = 0; $i -lt 15; $i++) {
              Start-Sleep -Seconds 2
              $network_info = & $ZT_CLI listnetworks | Out-String
              $match = [regex]::Match($network_info, '\b(?:10|172|192)\.\d{1,3}\.\d{1,3}\.\d{1,3}\b')
              if ($match.Success) { $zt_ip = $match.Value; break }
          }

          if ($zt_ip -eq "") {
              Write-Error "❌ 未能获取到 ZeroTier IP，请检查网络设置与控制台是否已授权节点。"
              # 导出调试信息供你查看
              Write-Host "`n---- zerotier-cli listnetworks 输出: ----`n"
              & $ZT_CLI listnetworks | Write-Host
              exit 1
          }

          echo "ZT_IP=$zt_ip" >> $env:GITHUB_ENV
          Write-Host "=================================================="
          Write-Host "✅ ZeroTier 已连通，分配到的局域网 IP: $zt_ip"
          Write-Host "请确保本地设备也加入同一 ZeroTier 网络，然后用 mstsc 连接该 IP。"
          Write-Host "用户名: runneradmin  密码: YourStrongPassw0rd!"
          Write-Host "=================================================="

      - name: Install glacc and Setup Account
        run: |
          Write-Host "开始下载 glacc 安装程序..."
          Invoke-WebRequest -Uri "https://down.geilijiasu.net/glacc_pc/glacc-setup.exe" -OutFile "$env:TEMP\glacc-setup.exe"
          
          Write-Host "静默安装 glacc..."
          Start-Process -FilePath "$env:TEMP\glacc-setup.exe" -ArgumentList "/S" -Wait -NoNewWindow
          
          $profilesDir = "C:\Program Files (x86)\glacc\Profiles"
          Write-Host "使用固定的配置目录: $profilesDir"
          New-Item -ItemType Directory -Force -Path $profilesDir | Out-Null
          
          Write-Host "从已经检出的仓库目录中复制所有文件..."
          $sourceDir = "$env:GITHUB_WORKSPACE\glacc-repo\*"
          
          # 使用 Copy-Item 递归复制所有内容到目标目录
          Copy-Item -Path $sourceDir -Destination $profilesDir -Recurse -Force
          Write-Host "✅ 仓库中所有文件已成功复制到 $profilesDir"

      - name: Keep Alive
        run: |
          Write-Host "=================================================="
          Write-Host "调试信息汇总："
          Write-Host "  RDP 地址:      $env:ZT_IP`:3389"
          Write-Host "  用户名: runneradmin  密码: YourStrongPassw0rd!"
          Write-Host "=================================================="
          Write-Host "保持 Action 运行中，调试完成请手动点击 Cancel workflow 结束。"
          while ($true) { Start-Sleep -Seconds 60 }

      - name: Cleanup ZeroTier Node
        if: always()
        env:
          ZEROTIER_NETWORK_ID: ${{ secrets.ZEROTIER_NETWORK_ID }}
          ZEROTIER_API_TOKEN: ${{ secrets.ZEROTIER_API_TOKEN }}
        run: |
          if ($env:ZT_NODE_ID) {
              Write-Host "正在清理临时 ZeroTier 节点 ($env:ZT_NODE_ID) ..."
              $headers = @{ "Authorization" = "bearer $($env:ZEROTIER_API_TOKEN)" }
              Invoke-RestMethod -Uri "https://my.zerotier.com/api/v1/network/$($env:ZEROTIER_NETWORK_ID)/member/$($env:ZT_NODE_ID)" -Method Delete -Headers $headers -ErrorAction SilentlyContinue
              Write-Host "✅ 节点已清理。"
          } else {
              Write-Host "未检测到 ZT_NODE_ID 环境变量，跳过清理。"
          }
