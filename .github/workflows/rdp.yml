name: Debug Windows via RDP

on: workflow_dispatch

jobs:
  run-windows-rdp:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup RDP and Ngrok
        env:
          NGROK_AUTHTOKEN: ${{ secrets.NGROK_AUTHTOKEN }}
        run: |
          # 1. 检查 Token 是否存在
          if ([string]::IsNullOrWhiteSpace($env:NGROK_AUTHTOKEN)) {
              Write-Error "❌ 错误: 未检测到 NGROK_AUTHTOKEN！"
              exit 1
          }

          # 2. 设置 Windows 密码并开启远程桌面
          Write-Host "正在配置远程桌面..."
          net user runneradmin YourStrongPassw0rd!
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          
          # 3. 安装 Ngrok
          Write-Host "正在安装 Ngrok..."
          choco install ngrok -y >$null
          ngrok config add-authtoken $env:NGROK_AUTHTOKEN
          
          # 4. 启动 Ngrok 并【强制捕获】所有报错信息
          Write-Host "启动内网穿透..."
          Start-Process -FilePath "ngrok" -ArgumentList "tcp 3389" -NoNewWindow -RedirectStandardOutput "ngrok_out.txt" -RedirectStandardError "ngrok_err.txt"
          
          # 等待 8 秒让它充分启动或报错
          Start-Sleep -Seconds 8
          
          # 打印出 Ngrok 的底层真实日志（极其重要，能看出为什么闪退）
          Write-Host "====== NGROK 底层运行日志 ======"
          if (Test-Path ngrok_out.txt) { Get-Content ngrok_out.txt }
          if (Test-Path ngrok_err.txt) { Get-Content ngrok_err.txt }
          Write-Host "================================"
          
          # 5. 尝试获取公网 URL
          try {
              $tunnel = Invoke-RestMethod -Uri "http://localhost:4040/api/tunnels" -ErrorAction Stop
              $publicUrl = $tunnel.tunnels[0].public_url
              Write-Host "✅ 远程桌面已就绪！"
              Write-Host "🌐 请在你的电脑上打开『远程桌面连接(mstsc)』，输入以下地址："
              Write-Host $publicUrl.Replace("tcp://", "")
              Write-Host "👤 用户名: runneradmin"
              Write-Host "🔑 密码: YourStrongPassw0rd!"
          } catch {
              Write-Error "❌ Ngrok 启动失败！请查看上方的【NGROK 底层运行日志】寻找具体原因。"
              exit 1
          }

      - name: Keep Alive
        run: |
          Write-Host "正在保持连接... 若要结束请手动在 GitHub 页面点击 Cancel workflow。"
          while ($true) { Start-Sleep -Seconds 60 }
