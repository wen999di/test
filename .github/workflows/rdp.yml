name: Debug Windows via Pinggy RDP

on: workflow_dispatch

jobs:
  run-windows-rdp:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Windows RDP & Pinggy Tunnel
        run: |
          Write-Host "正在配置远程桌面..."
          net user runneradmin YourStrongPassw0rd!
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          
          Write-Host "启动 Pinggy TCP 内网穿透..."
          # Windows 自带 OpenSSH，直接用 ssh 建立 TCP 隧道
          Start-Process -FilePath "ssh" -ArgumentList "-p 443 -R0:localhost:3389 -o StrictHostKeyChecking=no -o ServerAliveInterval=30 a.pinggy.io" -RedirectStandardOutput "pinggy_out.log" -RedirectStandardError "pinggy_err.log" -WindowStyle Hidden
          
          Write-Host "等待获取公网地址 (约 8 秒)..."
          Start-Sleep -Seconds 8
          
          # 从 Pinggy 的输出日志中提取分配的 TCP 端口
          $logContent = ""
          if (Test-Path pinggy_out.log) { $logContent += Get-Content pinggy_out.log -Raw }
          if (Test-Path pinggy_err.log) { $logContent += Get-Content pinggy_err.log -Raw }
          
          $match = [regex]::Match($logContent, 'tcp\..*?pinggy\.io:\d+')
          
          if ($match.Success) {
              $pinggy_url = $match.Value
              Write-Host "========================================================================"
              Write-Host "✅ 远程桌面隧道已建立！(由 Pinggy 提供)"
              Write-Host "🌐 请在你的电脑上打开『远程桌面连接(mstsc)』，直接输入以下地址连入："
              Write-Host "👉 $pinggy_url"
              Write-Host "👤 用户名: runneradmin"
              Write-Host "🔑 密码: YourStrongPassw0rd!"
              Write-Host "========================================================================"
          } else {
              Write-Error "❌ 无法获取 Pinggy 地址，请查看下方日志："
              Write-Host $logContent
              exit 1
          }

      - name: Keep Alive
        run: |
          Write-Host "正在保持连接... 若要结束请手动在 GitHub 页面点击 Cancel workflow。"
          while ($true) { Start-Sleep -Seconds 60 }
