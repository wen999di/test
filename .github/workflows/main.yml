name: Debug Windows GUI in Container

on: 
  workflow_dispatch: # 允许手动点击运行

jobs:
  run-windows:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Launch Dockur Windows Container
        run: |
          # 启动容器：
          # --privileged: 必须，用于开启 KVM 权限
          # VERSION="tiny11": 推荐精简版，启动飞快
          docker run -d \
            --name win-box \
            --privileged \
            -p 8006:8006 \
            -e VERSION="tiny11" \
            -e RAM_SIZE="6G" \
            -e CPU_CORES="2" \
            dockur/windows

      - name: Wait for Booting
        run: |
          echo "正在等待 Windows 虚拟显卡启动 (预计 2-3 分钟)..."
          # 循环检查容器 8006 端口是否响应
          timeout 300s bash -c 'until curl -s localhost:8006; do sleep 10; done'
          echo "✅ 容器 Web UI 已就绪！"

      - name: Setup Tmate Debug Session
        uses: mxschmitt/action-tmate@v3
        if: always() # 无论成功失败都保持开启，方便你调试
        with:
          limit-access-to-actor: true
