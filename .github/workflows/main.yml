name: Debug Windows GUI in Container

on: 
  workflow_dispatch: # 允许手动点击运行

jobs:
  run-windows:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Launch Dockur Windows Container
        run: |
          # 启动容器：
          # --privileged: 必须，用于开启 KVM 权限
          # VERSION="tiny11": 推荐精简版，启动飞快
          docker run -d \
            --name win-box \
            --privileged \
            -p 8006:8006 \
            -e VERSION="tiny11" \
            -e RAM_SIZE="6G" \
            -e CPU_CORES="2" \
            dockurr/windows

      - name: Wait for Booting
        run: |
          echo "正在等待 Windows 虚拟显卡启动 (预计 2-3 分钟)..."
          # 循环检查容器 8006 端口是否响应
          timeout 300s bash -c 'until curl -s localhost:8006; do sleep 10; done'
          echo "✅ 容器 Web UI 已就绪！"

      - name: Expose WebUI via Cloudflare Tunnel
        run: |
          # 下载并运行 Cloudflare Tunnel 将本地 8006 端口映射到公网
          curl -L -o cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x cloudflared
          ./cloudflared tunnel --url http://localhost:8006 > tunnel.log 2>&1 &
          
          # 等待隧道建立并获取 URL
          sleep 5
          echo "=========================================================="
          echo "🌐 请在浏览器中访问以下生成的公网 URL 来查看 Windows Web UI："
          grep -o 'https://.*\.trycloudflare.com' tunnel.log
          echo "=========================================================="

      - name: Setup Tmate Debug Session
        uses: mxschmitt/action-tmate@v3
        if: always() # 无论成功失败都保持开启，防止 Action 结束导致容器销毁
        with:
          limit-access-to-actor: true
